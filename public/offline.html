<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | TeamDock</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0f172a;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 2rem; margin-bottom: 10px; color: #818cf8; }
    p { font-size: 1rem; color: #94a3b8; max-width: 400px; line-height: 1.5; }
    button {
      margin-top: 24px;
      padding: 12px 24px;
      background-color: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background-color: #4f46e5; }
  </style>
</head>
<body>
  <h1>You are offline</h1>
  <p>TeamDock requires an active internet connection to sync your tasks and workspace data.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
